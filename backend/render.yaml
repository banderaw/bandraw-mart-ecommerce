services:
  - type: web
    name: bandraw-mart-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bandraw-mart-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DJANGO_ALLOWED_HOSTS
        value: bandraw-mart-backend.onrender.com,.onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://bandraw-mart-frontend.vercel.app,http://localhost:3000,http://127.0.0.1:3000
      - key: CSRF_TRUSTED_ORIGINS
        value: https://bandraw-mart-frontend.vercel.app,http://localhost:3000,http://127.0.0.1:3000
      - key: SECURE_SSL_REDIRECT
        value: true
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: CSRF_COOKIE_SECURE
        value: true